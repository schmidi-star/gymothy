<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&display=block">
<title>Gymothy</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --accent: #c8f542;
    --accent-dim: rgba(200,245,66,0.12);
    --accent-text: #0f0f0f;
    --red: #ff5c5c;
    --red-dim: rgba(255,92,92,0.12);
    --blue: #5c9eff;
    --blue-dim: rgba(92,158,255,0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; min-height: 100vh; opacity: 0; transition: opacity 0.6s ease 0.1s; }

  /* ── SPLASH ── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: #0f0f0f;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 16px;
    transition: opacity 0.7s ease;
  }
  #splash.hide { opacity: 0; pointer-events: none; }
  .splash-mark { display: flex; align-items: center; gap: 4px; }
  .splash-ring-wrap { position: relative; width: 68px; height: 68px; flex-shrink: 0; }
  .splash-ring-wrap svg { position: absolute; inset: 0; transform: rotate(-90deg); }
  .splash-ring-bg { fill: none; stroke: rgba(200,245,66,0.12); stroke-width: 2.5; }
  .splash-ring {
    fill: none; stroke: #c8f542; stroke-width: 2.5;
    stroke-linecap: round;
    stroke-dasharray: 201; stroke-dashoffset: 201;
    animation: draw-ring 0.7s cubic-bezier(0.4,0,0.2,1) 0.1s forwards;
  }
  .splash-g {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 36px; font-weight: 800;
    color: #c8f542; line-height: 1;
    opacity: 0;
    animation: fade-in 0.3s ease 0.75s forwards;
  }
  .splash-name {
    font-family: 'Syne', sans-serif; font-size: 52px; font-weight: 700;
    color: #f0f0f0; letter-spacing: -1.5px; line-height: 1;
    opacity: 0; transform: translateX(-18px);
    animation: slide-in 0.4s cubic-bezier(0.2,0,0,1) 0.95s forwards;
  }
  .splash-sub {
    font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
    letter-spacing: 5px; color: #666; text-transform: uppercase;
    opacity: 0;
    animation: fade-in 0.4s ease 1.2s forwards;
  }
  @keyframes draw-ring { to { stroke-dashoffset: 0; } }
  @keyframes fade-in { to { opacity: 1; } }
  @keyframes slide-in { to { opacity: 1; transform: translateX(0); } }

  /* ── NAV ── */
  .nav { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; border-bottom: 0.5px solid var(--border); background: var(--bg); position: sticky; top: 0; z-index: 100; }
  .nav-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .nav-actions { display: flex; gap: 8px; }
  .icon-btn { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 17px; }

  /* ── PAGES ── */
  .page { display: none; padding: 16px; max-width: 480px; margin: 0 auto; }
  .page.active { display: block; }

  /* ── TABBAR ── */
  .tabbar { position: fixed; bottom: 16px; left: 16px; right: 16px; background: rgba(24,24,24,0.92); border: 0.5px solid rgba(255,255,255,0.10); border-radius: 22px; display: flex; padding: 4px 6px; z-index: 100; -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px); box-shadow: 0 10px 34px rgba(0,0,0,0.5); }  
  .tab { position: relative; flex: 1; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 8px 4px; background: none; border: none; outline: none; -webkit-tap-highlight-color: transparent; }
  .tab-pill { position: absolute; top: 4px; width: 50px; height: 34px; border-radius: 13px; background: rgba(200,245,66,0.18); border: 0.5px solid rgba(200,245,66,0.4); left: 50%; transform: translateX(-50%) scale(0.75); opacity: 0; transition: opacity 0.22s ease, transform 0.28s cubic-bezier(.34,1.56,.64,1); pointer-events: none; z-index: 0; }  
  .tab.active .tab-pill { opacity: 1; transform: translateX(-50%) scale(1); }
  .tab-icon-svg { color: var(--text3); transition: color 0.2s ease; position: relative; z-index: 1; }
  .tab-fill { opacity: 0; transition: opacity 0.2s ease; }
  .tab.active .tab-icon-svg { color: var(--accent); }
  .tab.active .tab-fill { opacity: 0.15; }
  .tab-label { font-size: 10px; color: var(--text3); transition: color 0.2s ease; font-weight: 500; position: relative; z-index: 1; }
  .tab.active .tab-label { color: var(--accent); font-weight: 600; }
  .pb { padding-bottom: 110px; }

  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }

  /* ── SELECTORS ── */
  .selector-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .selector-label { font-size: 12px; color: var(--text3); min-width: 36px; }
  .selector-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; flex: 1; }
  .selector-scroll::-webkit-scrollbar { display: none; }
  .sel-btn { flex-shrink: 0; padding: 6px 14px; border-radius: 20px; border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 13px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .sel-btn.active { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
  .sel-btn.deload { border-color: var(--blue); color: var(--blue); }
  .sel-btn.deload.active { background: var(--blue); color: #fff; border-color: var(--blue); }
  .new-block-btn { flex-shrink: 0; padding: 6px 12px; border-radius: 20px; border: 0.5px solid var(--accent); background: transparent; color: var(--accent); font-size: 12px; cursor: pointer; white-space: nowrap; }

  /* ── DAY TABS ── */
  .day-tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .day-tab { flex: 1; padding: 10px 0; text-align: center; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text2); font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.15s; }
  .day-tab.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

  .session-date-badge { font-size: 12px; color: var(--text3); margin-bottom: 14px; padding: 6px 10px; background: var(--bg2); border-radius: var(--radius-sm); border: 0.5px solid var(--border); display: inline-block; }

  /* ── EXERCISES ── */
  .exercise-block { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: 10px; overflow: hidden; }
  .exercise-header { display: flex; justify-content: space-between; align-items: center; padding: 13px 16px; cursor: pointer; }
  .exercise-name { font-size: 15px; font-weight: 500; }
  .exercise-name.clickable { color: var(--accent); text-decoration: underline; text-underline-offset: 3px; }
  .exercise-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .exercise-chevron { font-size: 20px; color: var(--text3); transition: transform 0.2s; flex-shrink: 0; margin-left: 8px; }
  .exercise-chevron.open { transform: rotate(180deg); }
  .exercise-body { border-top: 0.5px solid var(--border); padding: 12px 16px; display: none; }
  .exercise-body.open { display: block; }
  .last-session-hint { font-size: 12px; color: var(--text3); background: var(--bg3); border-radius: var(--radius-sm); padding: 7px 10px; margin-bottom: 10px; }
  .last-session-hint strong { color: var(--text2); }

  /* ── SETS ── */
  .set-headers { display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 6px; margin-bottom: 4px; }
  .set-row { display: grid; grid-template-columns: 24px 1fr 1fr 1fr 28px; gap: 6px; align-items: center; margin-bottom: 7px; }
  .set-num { font-size: 12px; color: var(--text3); text-align: center; }
  .set-label { font-size: 10px; color: var(--text3); text-align: center; padding-bottom: 2px; }
  .set-input { background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 8px 4px; font-size: 14px; color: var(--text); text-align: center; width: 100%; }
  .set-input:focus { outline: none; border-color: var(--accent); }
  .set-input::placeholder { color: var(--text3); }
  .set-input.warn { border-color: var(--red); }
  .set-delete { background: none; border: none; color: var(--text3); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: var(--radius-sm); }
  .set-delete:hover { color: var(--red); background: var(--red-dim); }

  /* ── BUTTONS ── */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: var(--radius-sm); border: 0.5px solid var(--border2); background: transparent; color: var(--text); font-size: 14px; cursor: pointer; transition: all 0.15s; }
  .btn-accent { background: var(--accent); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }
  .btn-sm { padding: 7px 12px; font-size: 13px; }
  .btn-full { width: 100%; margin-top: 8px; }
  .btn-danger { color: var(--red); border-color: var(--red); }
  .btn-blue { color: var(--blue); border-color: var(--blue); }

  /* ── FORMS ── */
  .comment-area { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-size: 14px; padding: 10px; resize: vertical; min-height: 70px; font-family: inherit; margin-top: 6px; }
  .comment-area:focus { outline: none; border-color: var(--accent); }
  .comment-area::placeholder { color: var(--text3); }
  .weight-input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; align-items: end; }
  .input-group { display: flex; flex-direction: column; }
  .input-label { font-size: 12px; color: var(--text2); margin-bottom: 6px; display: block; min-height: 16px; }
  .text-input { width: 100%; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 8px; font-size: 15px; color: var(--text); font-family: inherit; box-sizing: border-box; height: 44px; min-width: 0; -webkit-appearance: none; appearance: none; }
  .text-input:focus { outline: none; border-color: var(--accent); }
  .text-input::placeholder { color: var(--text3); }

  /* ── STATS ── */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .stat-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 12px; }
  .stat-val { font-size: 22px; font-weight: 600; }
  .stat-lbl { font-size: 11px; color: var(--text2); margin-top: 2px; }

  /* ── SETTINGS ── */
  .settings-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 0; border-bottom: 0.5px solid var(--border); }
  .settings-label { font-size: 15px; }
  .settings-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

  /* ── MODALS ── */
  body.modal-open { overflow: hidden; touch-action: none; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--bg2); border-radius: var(--radius) var(--radius) 0 0; border: 0.5px solid var(--border2); padding: 20px; width: 100%; max-width: 480px; max-height: 88vh; overflow-y: auto; overscroll-behavior: contain; touch-action: pan-y; }
  .modal-title { font-size: 17px; font-weight: 600; margin-bottom: 16px; }
  .modal-close { float: right; background: none; border: none; color: var(--text2); font-size: 22px; cursor: pointer; margin-top: -4px; }

  .chart-wrap { position: relative; width: 100%; height: 220px; margin: 8px 0; }

  /* ── MISC ── */
  .section-title { font-size: 12px; font-weight: 500; color: var(--text3); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 10px; margin-top: 20px; }
  .section-title:first-child { margin-top: 0; }
  .toast { position: fixed; bottom: 85px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--radius-sm); padding: 10px 20px; font-size: 14px; opacity: 0; transition: all 0.3s; z-index: 300; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: rgba(200,245,66,0.5); color: var(--accent); }
  .toast.error { border-color: rgba(255,92,92,0.5); color: var(--red); }
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); }
  .empty-icon { font-size: 36px; margin-bottom: 10px; }
  .progress-ex-row { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
  .progress-ex-row:active { opacity: 0.7; }
</style>
</head>
<body>
<div id="splash">
  <div class="splash-mark">
    <div class="splash-ring-wrap">
      <svg viewBox="0 0 68 68" width="68" height="68">
        <circle class="splash-ring-bg" cx="34" cy="34" r="32"/>
        <circle class="splash-ring" cx="34" cy="34" r="32"/>
      </svg>
      <div class="splash-g">G</div>
    </div>
    <span class="splash-name">ymothy</span>
  </div>
  <div class="splash-sub">Strength Tracker</div>
</div>
<div class="nav">
  <div class="nav-title" id="navTitle">Gymothy</div>
  <div class="nav-actions">
    <button class="icon-btn" onclick="showGithubModal()" title="Save to GitHub">☁️</button>
  </div>
</div>

<div class="page active pb" id="page-train">
  <!-- Block selector -->
  <div class="selector-row" style="margin-top:4px;">
    <div class="selector-label">Block</div>
    <div class="selector-scroll" id="blockBar"></div>
    <button class="new-block-btn" onclick="newBlock()">+ New</button>
  </div>
  <!-- Week selector -->
  <div class="selector-row">
    <div class="selector-label">Week</div>
    <div class="selector-scroll" id="weekBar"></div>
  </div>
  <!-- Day selector -->
  <div class="day-tabs">
    <button class="day-tab active" onclick="selectDay('A',this)">Day A</button>
    <button class="day-tab" onclick="selectDay('B',this)">Day B</button>
    <button class="day-tab" onclick="selectDay('C',this)">Day C</button>
  </div>
  <div id="sessionDateBadge"></div>
  <div id="exerciseList"></div>
  <div style="margin-top:14px;">
    <div class="section-title">Session notes</div>
    <textarea class="comment-area" id="sessionComment" placeholder="Fatigue level, aches, anything to remember…" oninput="saveComment()" onfocus="this.placeholder=''" onblur="this.placeholder='Fatigue level, aches, anything to remember…'"></textarea>
  </div>
</div>

<div class="page pb" id="page-progress">
  <div id="progressContent"></div>
</div>

<div class="page pb" id="page-weight">
  <div class="section-title">Log body weight</div>
  <div class="weight-input-row">
    <div class="input-group">
      <label class="input-label">Weight (kg)</label>
      <input class="text-input" type="number" step="0.1" id="bwInput" placeholder="68.5">
    </div>
    <div class="input-group">
      <label class="input-label">Date</label>
      <input class="text-input" type="date" id="bwDate">
    </div>
    <button class="btn btn-accent" onclick="logWeight()" style="grid-column: 1 / -1;">Save</button>
  </div>
  <div id="weightChart" class="card" style="display:none;">
    <div class="section-title" style="margin-top:0;">Body weight over time</div>
    <div class="chart-wrap"><canvas id="bwCanvas"></canvas></div>
    <div id="bwStats" class="stat-grid" style="margin-top:12px;"></div>
  </div>
  <div id="weightLog"></div>
</div>

<div class="page pb" id="page-settings">
  <div class="section-title">GitHub sync</div>
  <div class="card">
    <div class="settings-row" style="border:none;padding-top:0;">
      <div><div class="settings-label">GitHub username</div></div>
      <input class="text-input" id="ghUser" placeholder="username" style="width:150px;text-align:right;" oninput="saveSettings()">
    </div>
    <div class="settings-row">
      <div><div class="settings-label">Repository name</div></div>
      <input class="text-input" id="ghRepo" placeholder="gymothy" style="width:150px;text-align:right;" oninput="saveSettings()">
    </div>
    <div class="settings-row" style="border:none;">
      <div><div class="settings-label">Personal access token</div><div class="settings-sub">Stored locally only</div></div>
      <input class="text-input" id="ghToken" type="password" placeholder="ghp_…" style="width:150px;text-align:right;" oninput="saveSettings()">
    </div>
  </div>

  <div class="section-title">Data</div>
  <div class="card">
    <button class="btn btn-full" onclick="exportData()">⬇ Export JSON backup</button>
    <button class="btn btn-full" onclick="document.getElementById('importFile').click()">⬆ Import JSON backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
    <button class="btn btn-full btn-danger" onclick="confirmClear()">🗑 Clear all data</button>
  </div>

  <div class="section-title">Current block</div>
  <div class="card" id="blockInfo"></div>
</div>

<div class="tabbar">
  <button class="tab active" onclick="showPage('train',this)">
    <div class="tab-pill"></div>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="tab-icon-svg">
      <g class="tab-fill" fill="currentColor">
        <rect x="4.5" y="8" width="3.2" height="8" rx="1.2"></rect>
        <rect x="16.3" y="8" width="3.2" height="8" rx="1.2"></rect>
      </g>
      <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4.5" y="8" width="3.2" height="8" rx="1.2"></rect>
        <rect x="16.3" y="8" width="3.2" height="8" rx="1.2"></rect>
        <line x1="7.7" y1="12" x2="16.3" y2="12"></line>
        <line x1="2.8" y1="9.6" x2="2.8" y2="14.4"></line>
        <line x1="21.2" y1="9.6" x2="21.2" y2="14.4"></line>
      </g>
    </svg>
    <div class="tab-label">Train</div>
  </button>

  <button class="tab" onclick="showPage('progress',this)">
    <div class="tab-pill"></div>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="tab-icon-svg">
      <g class="tab-fill" fill="currentColor">
        <rect x="4" y="12.5" width="3.6" height="6.5" rx="1.2"></rect>
        <rect x="16.4" y="4.5" width="3.6" height="14.5" rx="1.2"></rect>
      </g>
      <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="12.5" width="3.6" height="6.5" rx="1.2"></rect>
        <rect x="10.2" y="8.5" width="3.6" height="10.5" rx="1.2"></rect>
        <rect x="16.4" y="4.5" width="3.6" height="14.5" rx="1.2"></rect>
      </g>
    </svg>
    <div class="tab-label">Progress</div>
  </button>

  <button class="tab" onclick="showPage('weight',this)">
    <div class="tab-pill"></div>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="tab-icon-svg">
      <g class="tab-fill" fill="currentColor">
        <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
      </g>
      <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3.5" y="3.5" width="17" height="17" rx="4.5"></rect>
        <path d="M8.4 14.4 a3.8 3.8 0 0 1 7.2 0"></path>
        <line x1="12" y1="14.4" x2="14.1" y2="11.5"></line>
      </g>
    </svg>
    <div class="tab-label">Weight</div>
  </button>

  <button class="tab" onclick="showPage('settings',this)">
    <div class="tab-pill"></div>
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" class="tab-icon-svg">
      <g fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="7.5" x2="20" y2="7.5"></line>
        <line x1="4" y1="12" x2="20" y2="12"></line>
        <line x1="4" y1="16.5" x2="20" y2="16.5"></line>
      </g>
      <g fill="var(--bg)" stroke="currentColor" stroke-width="1.7">
        <circle cx="9" cy="7.5" r="2.3"></circle>
        <circle cx="15.5" cy="12" r="2.3"></circle>
        <circle cx="8" cy="16.5" r="2.3"></circle>
      </g>
    </svg>
    <div class="tab-label">Settings</div>
  </button>
</div>

<!-- EXERCISE PROGRESS MODAL -->
<div class="modal-overlay" id="exModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('exModal')">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div class="stat-grid" id="modalStats"></div>
    <div class="chart-wrap"><canvas id="modalCanvas"></canvas></div>
    <div style="margin-top:16px;">
      <div class="section-title">All sessions</div>
      <div id="modalHistory"></div>
    </div>
  </div>
</div>

<!-- GITHUB MODAL -->
<div class="modal-overlay" id="ghModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal('ghModal')">✕</button>
    <div class="modal-title">GitHub sync</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:16px;">Reads/writes <code style="color:var(--accent)">data.json</code> in your private repo.</p>
    <button class="btn btn-accent btn-full" onclick="saveToGithub()">☁️ Save to GitHub</button>
    <button class="btn btn-full btn-blue" style="margin-top:8px;" onclick="confirmLoadFromGithub()">⬇ Load from GitHub</button>
  </div>
</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <div class="modal-title" id="confirmTitle">Are you sure?</div>
    <p style="color:var(--text2);font-size:14px;margin-bottom:20px;" id="confirmMsg"></p>
    <button class="btn btn-accent btn-full" id="confirmOk">Confirm</button>
    <button class="btn btn-full" style="margin-top:8px;" onclick="closeModal('confirmModal')">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ─── EXERCISE DEFINITIONS ────────────────────────────────────────────────────
const EXERCISES = {
  A: [
    { id:'rdl',  name:'Romanian deadlift (barbell)', target:'8–10 reps', rpe:'7–8' },
    { id:'bss',  name:'Bulgarian split squat (DB)',  target:'10 each leg', rpe:'7' },
    { id:'ht',   name:'Hip thrust (machine)',        target:'10–12 reps', rpe:'7–8 / top 8–9' },
    { id:'ghr',  name:'Glute ham raise',             target:'8–10 reps', rpe:'7' },
    { id:'abd',  name:'Abductor machine / banded clamshell', target:'20 reps', rpe:'6–7' },
  ],
  B: [
    { id:'idp',  name:'Incline dumbbell press',       target:'8–10 reps', rpe:'7–8' },
    { id:'dlr',  name:'Dumbbell lateral raise',       target:'15 reps',   rpe:'7' },
    { id:'scr',  name:'Seated cable row (close grip)',target:'10–12 reps',rpe:'7' },
    { id:'lp',   name:'Lat pulldown',                 target:'10–12 reps',rpe:'7–8' },
    { id:'te',   name:'Tricep extension',             target:'12 reps',   rpe:'7' },
  ],
  C: [
    { id:'bs',   name:'Back squat',                   target:'6–8 reps',  rpe:'7–8' },
    { id:'db',   name:'Dumbbell bench',               target:'10 reps',   rpe:'7' },
    { id:'slp',  name:'Single leg press (high foot)', target:'12 each leg',rpe:'7' },
    { id:'fp',   name:'Face pull (rope)',              target:'15 reps',   rpe:'6–7' },
    { id:'core', name:'Core – choice',                target:'varies',    rpe:'6–7' },
  ]
};

// ─── STATE ───────────────────────────────────────────────────────────────────
let state = {
  currentBlock: 1,
  blocks: {
    1: { startDate: today(), label: 'Block 1' }
  },
  sessions: {},   // key: "B1-W1-A-2024-01-15"
  weights: [],
  settings: { ghUser:'', ghRepo:'', ghToken:'' }
};

let currentBlock = 1;
let currentWeek = 1;
let currentDay = 'A';
let modalChart = null;
let bwChart = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function today() {
  return new Date().toISOString().split('T')[0];
}

function sessionKey(block, week, day, date) {
  return `B${block}-W${week}-${day}-${date}`;
}

function getSessionsForWeekDay(block, week, day) {
  // Find all sessions matching block+week+day regardless of date
  return Object.entries(state.sessions)
    .filter(([k]) => k.startsWith(`B${block}-W${week}-${day}-`))
    .map(([k, v]) => ({ key: k, date: k.split('-').slice(3).join('-'), ...v }))
    .sort((a,b) => b.date.localeCompare(a.date)); // most recent first
}

function getCurrentSession() {
  // Today's session for current block/week/day
  const k = sessionKey(currentBlock, currentWeek, currentDay, today());
  if (!state.sessions[k]) state.sessions[k] = { sets: {}, comment: '' };
  return state.sessions[k];
}

function getOrCreateSession(block, week, day, date) {
  const k = sessionKey(block, week, day, date);
  if (!state.sessions[k]) state.sessions[k] = { sets: {}, comment: '' };
  return state.sessions[k];
}

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
  loadState();
  currentBlock = state.currentBlock || 1;
  currentWeek = state.currentWeek || 1;
  currentDay = 'A';
  buildBlockBar();
  buildWeekBar();
  renderExercises();
  loadComment();
  renderWeightLog();
  setTodayDate();
  renderBlockInfo();
// Dismiss splash
  document.body.style.opacity = '1';
  document.body.style.transition = 'opacity 0.3s ease';
  const splash = document.getElementById('splash');
  setTimeout(() => splash.classList.add('hide'), 2400);
  setTimeout(() => splash.remove(), 2950);
}

function loadState() {
  try {
    const s = localStorage.getItem('gymothy');
    if (s) {
      const parsed = JSON.parse(s);
      state = { ...state, ...parsed };
    }
  } catch(e) {}
  // Sync settings to inputs
  setTimeout(() => {
    document.getElementById('ghUser').value = state.settings.ghUser || '';
    document.getElementById('ghRepo').value = state.settings.ghRepo || '';
    document.getElementById('ghToken').value = state.settings.ghToken || '';
  }, 0);
}

function saveState() {
  state.currentBlock = currentBlock;
  state.currentWeek = currentWeek;
  localStorage.setItem('gymothy', JSON.stringify(state));
}

function setTodayDate() {
  document.getElementById('bwDate').value = today();
}

// ─── BLOCK BAR ───────────────────────────────────────────────────────────────
function buildBlockBar() {
  const bar = document.getElementById('blockBar');
  bar.innerHTML = '';
  const blocks = Object.keys(state.blocks).map(Number).sort((a,b)=>a-b);
  blocks.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'sel-btn' + (b === currentBlock ? ' active' : '');
    btn.textContent = state.blocks[b].label || `Block ${b}`;
    btn.onclick = () => selectBlock(b, btn);
    bar.appendChild(btn);
  });
}

function selectBlock(b, btn) {
  currentBlock = b;
  currentWeek = 1;
  state.currentBlock = b;
  document.querySelectorAll('#blockBar .sel-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  // Reset week bar to week 1
  buildWeekBar();
  renderExercises();
  loadComment();
}

function newBlock() {
  const blockNums = Object.keys(state.blocks).map(Number);
  const next = Math.max(...blockNums) + 1;
  state.blocks[next] = { startDate: today(), label: `Block ${next}` };
  currentBlock = next;
  currentWeek = 1;
  state.currentBlock = next;
  saveState();
  buildBlockBar();
  buildWeekBar();
  renderExercises();
  loadComment();
  renderBlockInfo();
  showToast(`Block ${next} started 💪`, 'success');
}

// ─── WEEK BAR ────────────────────────────────────────────────────────────────
function buildWeekBar() {
  const bar = document.getElementById('weekBar');
  bar.innerHTML = '';
  for (let w = 1; w <= 6; w++) {
    const btn = document.createElement('button');
    const isDeload = w === 6;
    btn.className = 'sel-btn' + (isDeload ? ' deload' : '') + (w === currentWeek ? ' active' : '');
    btn.textContent = isDeload ? 'Deload' : `Week ${w}`;
    btn.dataset.w = w;
    btn.onclick = () => selectWeek(w, btn);
    bar.appendChild(btn);
  }
}

function selectWeek(w, btn) {
  currentWeek = w;
  document.querySelectorAll('#weekBar .sel-btn').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  saveState();
  renderExercises();
  loadComment();
}

function selectDay(d, btn) {
  currentDay = d;
  document.querySelectorAll('.day-tab').forEach(x => x.classList.remove('active'));
  btn.classList.add('active');
  renderExercises();
  loadComment();
}

// ─── RENDER EXERCISES ────────────────────────────────────────────────────────
function renderExercises() {
  const list = document.getElementById('exerciseList');
  const isDeload = currentWeek === 6;
  const exercises = EXERCISES[currentDay];
  const maxSets = 10;

  // Find existing session for this block/week/day (any date)
  const existing = getSessionsForWeekDay(currentBlock, currentWeek, currentDay);
  // Don't auto-create a session just by viewing — only create when user adds a set
  const sess = existing.length > 0 ? state.sessions[existing[0].key] : { sets: {}, comment: '' };
  const sessDate = existing.length > 0 ? existing[0].date : today();

  // Session date badge
  const badge = document.getElementById('sessionDateBadge');
  badge.innerHTML = `<div class="session-date-badge">B${currentBlock} · W${currentWeek} · ${currentDay} · ${sessDate}</div>`;

  // Deload notice
  list.innerHTML = '';
  if (isDeload) {
    list.innerHTML = `<div style="background:var(--blue-dim);border:0.5px solid rgba(92,158,255,0.3);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--blue);">
      <strong>Deload week</strong> — 2 sets max, RPE ≤ 6. Exercise names are editable for variations.
    </div>`;
  }

  // Get last session hint (previous week or same week/day from last block)
  const lastSessionSets = getLastSessionSets(currentBlock, currentWeek, currentDay);

  exercises.forEach((ex, idx) => {
    const savedSets = sess.sets[ex.id] || [];
    const setCount = savedSets.filter(s => s.w || s.r).length;
    const vol = computeVolume(savedSets);
    const rpeTarget = isDeload ? '≤6' : ex.rpe;
    const lastHint = lastSessionSets[ex.id];

    const block = document.createElement('div');
    block.className = 'exercise-block';

    const nameHtml = isDeload
      ? `<input class="text-input" value="${ex.name}" style="font-size:15px;font-weight:500;background:transparent;border:none;padding:0;width:220px;color:var(--text);" onchange="updateDeloadName('${ex.id}',this.value,${JSON.stringify(sessDate)})" onclick="event.stopPropagation()">`
      : `<div class="exercise-name clickable" onclick="event.stopPropagation();openExerciseModal('${ex.id}','${ex.name.replace(/'/g,"\\'")}')">` + ex.name + `</div>`;

    block.innerHTML = `
      <div class="exercise-header" onclick="toggleExercise('ex-${idx}')">
        <div style="flex:1;min-width:0;">
          ${nameHtml}
          <div class="exercise-meta" id="meta-${ex.id}">${ex.target} · RPE ${rpeTarget}${setCount > 0 ? ` · ${setCount} set${setCount>1?'s':''} · ${vol.toLocaleString()} kg` : ''}</div>
        </div>
        <div class="exercise-chevron" id="chev-${idx}">⌄</div>
      </div>
      <div class="exercise-body" id="ex-${idx}">
        ${lastHint ? `<div class="last-session-hint">Last time: <strong>${lastHint}</strong></div>` : ''}
        <div class="set-headers">
          <div></div>
          <div class="set-label">kg</div>
          <div class="set-label">reps</div>
          <div class="set-label">RPE</div>
          <div></div>
        </div>
        <div id="sets-${ex.id}"></div>
        <button class="btn btn-sm" style="margin-top:4px;" onclick="addSet('${ex.id}',${maxSets},'${sessDate}')">+ Add set</button>
      </div>
    `;
    list.appendChild(block);
    renderSets(ex.id, savedSets, maxSets, isDeload);
  });
}

function getLastSessionSets(block, week, day) {
  // Look for previous week in same block, or last block same week
  const hints = {};
  // Try previous weeks in same block
  for (let w = week - 1; w >= 1; w--) {
    const prev = getSessionsForWeekDay(block, w, day);
    if (prev.length > 0) {
      const prevSess = state.sessions[prev[0].key];
      EXERCISES[day].forEach(ex => {
        if (!hints[ex.id]) {
          const sets = (prevSess.sets[ex.id] || []).filter(s => s.w && s.r);
          if (sets.length) {
            const top = sets.reduce((b,s) => Number(s.w) > Number(b.w) ? s : b, sets[0]);
            const setsSummary = sets.map(s => `${s.w}×${s.r}@${s.rpe||'?'}`).join(', ');
            hints[ex.id] = `${setsSummary} (W${w})`;
          }
        }
      });
      break;
    }
  }
  return hints;
}

function toggleExercise(bodyId) {
  const body = document.getElementById(bodyId);
  const idx = bodyId.replace('ex-', '');
  const chev = document.getElementById('chev-' + idx);
  const isOpen = body.classList.contains('open');
  body.classList.toggle('open', !isOpen);
  if (chev) chev.classList.toggle('open', !isOpen);
}

function renderSets(exId, sets, maxSets, isDeload) {
  const container = document.getElementById('sets-' + exId);
  if (!container) return;
  container.innerHTML = '';
  sets.forEach((s, i) => container.appendChild(buildSetRow(exId, i, s, isDeload)));
}

function buildSetRow(exId, idx, s, isDeload) {
  const row = document.createElement('div');
  row.className = 'set-row';
  const rpeWarn = isDeload && s.rpe && parseFloat(s.rpe) > 6;
  row.innerHTML = `
    <div class="set-num">${idx + 1}</div>
    <input class="set-input" type="number" step="0.5" min="0" placeholder="—" value="${s.w||''}" onchange="updateSet('${exId}',${idx},'w',this.value)">
    <input class="set-input" type="number" min="1" max="100" placeholder="—" value="${s.r||''}" onchange="updateSet('${exId}',${idx},'r',this.value)">
    <input class="set-input${rpeWarn?' warn':''}" type="number" step="0.5" min="1" max="10" placeholder="—" value="${s.rpe||''}" onchange="updateSet('${exId}',${idx},'rpe',this.value,true)">
    <button class="set-delete" onclick="deleteSet('${exId}',${idx})">✕</button>
  `;
  return row;
}

function getSessForCurrentView(createIfMissing = false) {
  const existing = getSessionsForWeekDay(currentBlock, currentWeek, currentDay);
  if (existing.length > 0) return { key: existing[0].key, sess: state.sessions[existing[0].key] };
  // Only create a new session if explicitly requested (e.g. when adding a set)
  if (createIfMissing) {
    const k = sessionKey(currentBlock, currentWeek, currentDay, today());
    if (!state.sessions[k]) state.sessions[k] = { sets: {}, comment: '' };
    return { key: k, sess: state.sessions[k] };
  }
  return { key: null, sess: { sets: {}, comment: '' } };
}

function addSet(exId, maxSets, date) {
  const { sess } = getSessForCurrentView(true);
  if (!sess.sets[exId]) sess.sets[exId] = [];
  if (sess.sets[exId].length >= maxSets) { showToast(`Max ${maxSets} sets`, 'error'); return; }

  // Capture open states before re-render
  const openStates = EXERCISES[currentDay].map((ex, i) =>
    document.getElementById(`ex-${i}`)?.classList.contains('open') ?? false
  );

  sess.sets[exId].push({ w:'', r:'', rpe:'' });
  saveState();
  renderExercises();

  // Restore open states, always force-open the one we just added to
  const targetIdx = EXERCISES[currentDay].findIndex(e => e.id === exId);
  EXERCISES[currentDay].forEach((ex, i) => {
    if (openStates[i] || i === targetIdx) {
      document.getElementById(`ex-${i}`)?.classList.add('open');
      document.getElementById(`chev-${i}`)?.classList.add('open');
    }
  });
}

function updateSet(exId, idx, field, val, checkDeload) {
  const { sess } = getSessForCurrentView();
  if (!sess.sets[exId]) sess.sets[exId] = [];
  if (!sess.sets[exId][idx]) sess.sets[exId][idx] = {};

  // Validate
  let num = val === '' ? '' : parseFloat(val);
  if (val !== '' && (isNaN(num) || num < 0)) { showToast('Invalid value', 'error'); return; }
  if (field === 'rpe' && val !== '' && (num < 1 || num > 10)) { showToast('RPE must be 1–10', 'error'); return; }
  if (field === 'r' && val !== '' && (num < 1 || num > 100)) { showToast('Check your reps', 'error'); return; }
  if (field === 'w' && val !== '' && num <= 0) { showToast('Weight must be positive', 'error'); return; }

  // Deload RPE warning
  if (checkDeload && currentWeek === 6 && val !== '' && num > 6) {
    showToast('⚠️ Deload RPE target is ≤6', 'error');
  }

  // Partial set warning
  sess.sets[exId][idx][field] = num;
  saveState();
  updateExMeta(exId);

  // Visual warn on RPE input for deload
  const rpeInput = document.querySelector(`#sets-${exId} .set-row:nth-child(${idx+1}) .set-input:nth-child(4)`);
  if (rpeInput && currentWeek === 6 && field === 'rpe' && num > 6) rpeInput.classList.add('warn');
  else if (rpeInput) rpeInput.classList.remove('warn');
}

function deleteSet(exId, idx) {
  const { sess } = getSessForCurrentView();
  if (!sess.sets[exId]) return;

  // Capture which exercises are open before re-render
  const openStates = EXERCISES[currentDay].map((ex, i) =>
    document.getElementById(`ex-${i}`)?.classList.contains('open') ?? false
  );

  sess.sets[exId].splice(idx, 1);
  saveState();
  renderExercises();

  // Restore accordion state
  EXERCISES[currentDay].forEach((ex, i) => {
    if (openStates[i]) {
      document.getElementById(`ex-${i}`)?.classList.add('open');
      document.getElementById(`chev-${i}`)?.classList.add('open');
    }
  });
}

function updateDeloadName(exId, val, date) {
  const k = sessionKey(currentBlock, currentWeek, currentDay, date);
  if (!state.sessions[k]) state.sessions[k] = { sets:{}, comment:'' };
  if (!state.sessions[k].deloadNames) state.sessions[k].deloadNames = {};
  state.sessions[k].deloadNames[exId] = val;
  saveState();
}

function updateExMeta(exId) {
  const { sess } = getSessForCurrentView();
  const ex = EXERCISES[currentDay].find(e => e.id === exId);
  if (!ex) return;
  const sets = sess.sets[ex.id] || [];
  const setCount = sets.filter(s => s.w || s.r).length;
  const vol = computeVolume(sets);
  const rpeTarget = currentWeek === 6 ? '≤6' : ex.rpe;
  const el = document.getElementById('meta-' + exId);
  if (el) el.textContent = `${ex.target} · RPE ${rpeTarget}${setCount > 0 ? ` · ${setCount} set${setCount>1?'s':''} · ${vol.toLocaleString()} kg` : ''}`;
}

function computeVolume(sets) {
  return sets.reduce((acc, s) => acc + (s.w && s.r ? Number(s.w) * Number(s.r) : 0), 0);
}

// ─── COMMENT ─────────────────────────────────────────────────────────────────
function saveComment() {
  const { sess } = getSessForCurrentView();
  sess.comment = document.getElementById('sessionComment').value;
  saveState();
}

function loadComment() {
  const existing = getSessionsForWeekDay(currentBlock, currentWeek, currentDay);
  const comment = existing.length > 0 ? (state.sessions[existing[0].key].comment || '') : '';
  document.getElementById('sessionComment').value = comment;
}

// ─── PROGRESS PAGE ───────────────────────────────────────────────────────────
function showProgressPage() {
  const content = document.getElementById('progressContent');
  content.innerHTML = '';

  ['A','B','C'].forEach(day => {
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = `Day ${day}`;
    content.appendChild(title);

    EXERCISES[day].forEach(ex => {
      const history = getExerciseHistory(ex.id);
      const last = history[history.length - 1];
      const lastTop = last ? topSet(last.sets) : null;

      const row = document.createElement('div');
      row.className = 'progress-ex-row';
      row.innerHTML = `
        <div>
          <div style="font-size:15px;font-weight:500;color:var(--accent);">${ex.name}</div>
          <div style="font-size:12px;color:var(--text3);margin-top:3px;">${history.length} session${history.length!==1?'s':''} logged</div>
        </div>
        <div style="text-align:right;">
          ${lastTop ? `<div style="font-size:15px;font-weight:600;">${lastTop.w} kg</div><div style="font-size:11px;color:var(--text3);">last top</div>` : '<div style="font-size:13px;color:var(--text3);">No data</div>'}
        </div>
      `;
      row.onclick = () => openExerciseModal(ex.id, ex.name);
      content.appendChild(row);
    });
  });
}

function getExerciseHistory(exId) {
  const results = [];
  Object.entries(state.sessions).forEach(([key, sess]) => {
    const sets = sess.sets[exId];
    if (sets && sets.some(s => s.w || s.r)) {
      const parts = key.split('-');
      // B1-W1-A-2024-01-15
      const date = parts.slice(3).join('-');
      const block = parts[0];
      const week = parts[1];
      results.push({ key, date, block, week, sets });
    }
  });
  results.sort((a,b) => a.date.localeCompare(b.date));
  return results;
}

function topSet(sets) {
  const valid = sets.filter(s => s.w && s.r);
  if (!valid.length) return null;
  return valid.reduce((best, s) => (!best || Number(s.w) > Number(best.w)) ? s : best, null);
}

// ─── EXERCISE MODAL ───────────────────────────────────────────────────────────
function openExerciseModal(exId, exName) {
  const history = getExerciseHistory(exId);
  document.getElementById('modalTitle').textContent = exName;

  const allSets = history.flatMap(h => h.sets.filter(s => s.w && s.r));
  const topW = allSets.length ? Math.max(...allSets.map(s => Number(s.w))) : 0;
  const rpeArr = allSets.filter(s => s.rpe).map(s => Number(s.rpe));
  const avgRpe = rpeArr.length ? (rpeArr.reduce((a,b)=>a+b,0)/rpeArr.length).toFixed(1) : '—';
  const lastVol = history.length ? computeVolume(history[history.length-1].sets) : 0;

  document.getElementById('modalStats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${topW ? topW+' kg' : '—'}</div><div class="stat-lbl">All-time top set</div></div>
    <div class="stat-card"><div class="stat-val">${history.length}</div><div class="stat-lbl">Sessions</div></div>
    <div class="stat-card"><div class="stat-val">${lastVol ? lastVol.toLocaleString()+' kg' : '—'}</div><div class="stat-lbl">Last vol</div></div>
    <div class="stat-card"><div class="stat-val">${avgRpe}</div><div class="stat-lbl">Avg RPE</div></div>
  `;

  const histDiv = document.getElementById('modalHistory');
  if (!history.length) {
    histDiv.innerHTML = '<div class="empty"><div class="empty-icon">📊</div><div>No sessions yet</div></div>';
  } else {
    histDiv.innerHTML = history.slice().reverse().map(h => {
      const ts = topSet(h.sets);
      const vol = computeVolume(h.sets);
      return `<div style="padding:10px 0;border-bottom:0.5px solid var(--border);">
        <div style="display:flex;justify-content:space-between;">
          <div style="font-size:13px;color:var(--text2);">${h.date} <span style="color:var(--text3);font-size:11px;">${h.block} ${h.week}</span></div>
          <div style="font-size:13px;">${ts ? ts.w+' kg × '+ts.r : ''}</div>
        </div>
        <div style="font-size:12px;color:var(--text3);margin-top:2px;">${h.sets.filter(s=>s.w||s.r).length} sets · ${vol.toLocaleString()} kg vol</div>
      </div>`;
    }).join('');
  }

  if (modalChart) { modalChart.destroy(); modalChart = null; }
  if (history.length) {
    const labels = history.map(h => h.date.slice(5));
    const topWeights = history.map(h => topSet(h.sets)?.w || null);
    const volumes = history.map(h => computeVolume(h.sets));
    modalChart = new Chart(document.getElementById('modalCanvas'), {
      type: 'line',
      data: { labels, datasets: [
        { label:'Top set (kg)', data:topWeights, borderColor:'#c8f542', backgroundColor:'rgba(200,245,66,0.1)', tension:0.3, pointRadius:4, yAxisID:'y' },
        { label:'Volume', data:volumes, borderColor:'#5c9eff', backgroundColor:'rgba(92,158,255,0.1)', tension:0.3, pointRadius:4, borderDash:[4,3], yAxisID:'y2' }
      ]},
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{ display:false } },
        scales:{
          y:{ position:'left', grid:{color:'rgba(255,255,255,0.06)'}, ticks:{color:'#999',font:{size:11}} },
          y2:{ position:'right', grid:{drawOnChartArea:false}, ticks:{color:'#5c9eff',font:{size:11}} },
          x:{ grid:{color:'rgba(255,255,255,0.06)'}, ticks:{color:'#999',font:{size:11}} }
        }
      }
    });
  }
  document.body.classList.add('modal-open');
  document.getElementById('exModal').classList.add('open');
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
  document.body.classList.remove('modal-open');
}

// ─── WEIGHT ───────────────────────────────────────────────────────────────────
function logWeight() {
  const kg = parseFloat(document.getElementById('bwInput').value);
  const date = document.getElementById('bwDate').value;
  if (!kg || !date) { showToast('Enter weight and date', 'error'); return; }
  if (kg < 20 || kg > 300) { showToast('Check your weight value', 'error'); return; }
  state.weights = state.weights.filter(w => w.date !== date);
  state.weights.push({ date, kg });
  state.weights.sort((a,b) => a.date.localeCompare(b.date));
  saveState();
  document.getElementById('bwInput').value = '';
  renderWeightLog();
  showToast('Weight logged ✓', 'success');
}

function renderWeightLog() {
  const container = document.getElementById('weightLog');
  const chartCard = document.getElementById('weightChart');
  const weights = state.weights;
  if (!weights.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">⚖️</div><div>No weight logged yet</div></div>';
    chartCard.style.display = 'none';
    return;
  }
  chartCard.style.display = 'block';
  const recent = weights.slice(-7);
  const avg = recent.reduce((a,w)=>a+w.kg,0)/recent.length;
  const diff = weights[weights.length-1].kg - weights[0].kg;
  document.getElementById('bwStats').innerHTML = `
    <div class="stat-card"><div class="stat-val">${weights[weights.length-1].kg.toFixed(1)} kg</div><div class="stat-lbl">Current</div></div>
    <div class="stat-card"><div class="stat-val">${avg.toFixed(1)} kg</div><div class="stat-lbl">7-day avg</div></div>
    <div class="stat-card"><div class="stat-val" style="color:${diff<=0?'var(--accent)':'var(--red)'}">${diff>0?'+':''}${diff.toFixed(1)} kg</div><div class="stat-lbl">Total change</div></div>
    <div class="stat-card"><div class="stat-val">${weights.length}</div><div class="stat-lbl">Check-ins</div></div>
  `;
  if (bwChart) { bwChart.destroy(); bwChart = null; }
  bwChart = new Chart(document.getElementById('bwCanvas'), {
    type:'line',
    data:{ labels:weights.map(w=>w.date.slice(5)), datasets:[{ label:'kg', data:weights.map(w=>w.kg), borderColor:'#c8f542', backgroundColor:'rgba(200,245,66,0.08)', tension:0.3, pointRadius:3, fill:true }] },
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ y:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#999',font:{size:11}}}, x:{grid:{color:'rgba(255,255,255,0.06)'},ticks:{color:'#999',font:{size:11},maxTicksLimit:8}} } }
  });
  container.innerHTML = `<div class="section-title" style="margin-top:20px;">Log history</div>` +
    weights.slice().reverse().map(w =>
      `<div id="bw-row-${w.date}" style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--border);">
        <div style="font-size:14px;color:var(--text2);">${w.date}</div>
        <div style="display:flex;gap:4px;align-items:center;">
          <div style="font-size:15px;font-weight:500;margin-right:6px;">${w.kg.toFixed(1)} kg</div>
          <button onclick="editWeight('${w.date}')" class="set-delete" style="font-size:13px;width:auto;padding:0 8px;">Edit</button>
          <button onclick="deleteWeight('${w.date}')" class="set-delete">×</button>
        </div>
      </div>`
    ).join('');
}

function deleteWeight(date) {
  state.weights = state.weights.filter(w => w.date !== date);
  saveState();
  renderWeightLog();
  showToast('Entry deleted', 'success');
}

function editWeight(date) {
  const entry = state.weights.find(w => w.date === date);
  if (!entry) return;
  const row = document.getElementById('bw-row-' + date);
  row.innerHTML = `
    <div style="font-size:14px;color:var(--text2);">${date}</div>
    <div style="display:flex;gap:6px;align-items:center;">
      <input type="number" step="0.1" value="${entry.kg}" id="bw-edit-${date}"
        style="width:72px;background:var(--bg3);border:0.5px solid var(--border2);color:var(--text);border-radius:6px;padding:5px 8px;font-size:14px;font-family:inherit;"
        onkeydown="if(event.key==='Enter')saveWeightEdit('${date}');if(event.key==='Escape')renderWeightLog();">
      <button onclick="saveWeightEdit('${date}')" style="padding:5px 10px;border-radius:6px;border:0.5px solid var(--border2);background:var(--bg3);color:var(--text);font-size:13px;cursor:pointer;">Save</button>
      <button onclick="renderWeightLog()" class="set-delete">×</button>
    </div>`;
  const input = document.getElementById('bw-edit-' + date);
  input.focus();
  input.select();
}

function saveWeightEdit(date) {
  const kg = parseFloat(document.getElementById('bw-edit-' + date).value);
  if (!kg || kg < 20 || kg > 300) { showToast('Check your weight value', 'error'); return; }
  const entry = state.weights.find(w => w.date === date);
  if (!entry) return;
  entry.kg = kg;
  saveState();
  renderWeightLog();
  showToast('Entry updated', 'success');
}

// ─── SETTINGS ────────────────────────────────────────────────────────────────
function saveSettings() {
  state.settings.ghUser = document.getElementById('ghUser').value.trim();
  state.settings.ghRepo = document.getElementById('ghRepo').value.trim();
  state.settings.ghToken = document.getElementById('ghToken').value.trim();
  saveState();
}

function renderBlockInfo() {
  const el = document.getElementById('blockInfo');
  if (!el) return;
  const blocks = Object.keys(state.blocks).map(Number).sort((a,b)=>a-b);
  el.innerHTML = blocks.map(b => `
    <div class="settings-row" style="${b===blocks[blocks.length-1]?'border:none;':''}">
      <div><div class="settings-label">${state.blocks[b].label}</div><div class="settings-sub">Started ${state.blocks[b].startDate}</div></div>
      <div style="font-size:13px;color:var(--text3);">${b===currentBlock?'Current':''}</div>
    </div>
  `).join('');
}

// ─── GITHUB ───────────────────────────────────────────────────────────────────
function showGithubModal() {
  document.body.classList.add('modal-open');
  document.getElementById('ghModal').classList.add('open');
}

function safeStateForSync() {
  // Never include credentials in synced or exported data
  const { settings, ...rest } = state;
  return rest;
}

async function saveToGithub() {
  const { ghUser, ghRepo, ghToken } = state.settings;
  if (!ghUser || !ghRepo || !ghToken) {
    showToast('Set GitHub credentials in Settings', 'error');
    closeModal('ghModal');
    showPage('settings', document.querySelectorAll('.tab')[3]);
    return;
  }
  showToast('Saving…');
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(safeStateForSync(), null, 2))));
  const apiUrl = `https://api.github.com/repos/${ghUser}/${ghRepo}/contents/data.json`;
  try {
    let sha = '';
    try {
      const r = await fetch(apiUrl, { headers:{ Authorization:`token ${ghToken}`, Accept:'application/vnd.github.v3+json' } });
      if (r.ok) { const d = await r.json(); sha = d.sha; }
    } catch(e) {}
    const body = { message:`Gymothy sync ${today()}`, content };
    if (sha) body.sha = sha;
    const res = await fetch(apiUrl, { method:'PUT', headers:{ Authorization:`token ${ghToken}`, Accept:'application/vnd.github.v3+json', 'Content-Type':'application/json' }, body:JSON.stringify(body) });
    if (res.ok) { showToast('Saved to GitHub ✓', 'success'); closeModal('ghModal'); }
    else { const err = await res.json(); showToast('Error: ' + (err.message||res.status), 'error'); }
  } catch(e) { showToast('Network error — saved locally', 'error'); }
}

function confirmLoadFromGithub() {
  document.getElementById('confirmTitle').textContent = 'Load from GitHub?';
  document.getElementById('confirmMsg').textContent = 'This will overwrite your local data with the GitHub version. Any unsynced local changes will be lost.';
  document.getElementById('confirmOk').onclick = () => { closeModal('confirmModal'); loadFromGithub(); };
  document.body.classList.add('modal-open');
  document.getElementById('confirmModal').classList.add('open');
}

async function loadFromGithub() {
  const { ghUser, ghRepo, ghToken } = state.settings;
  if (!ghUser || !ghRepo || !ghToken) { showToast('Set GitHub credentials first', 'error'); return; }
  showToast('Loading…');
  const apiUrl = `https://api.github.com/repos/${ghUser}/${ghRepo}/contents/data.json`;
  try {
    const res = await fetch(apiUrl, { headers:{ Authorization:`token ${ghToken}`, Accept:'application/vnd.github.v3+json' } });
    if (!res.ok) { showToast('Could not load from GitHub', 'error'); return; }
    const data = await res.json();
    const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g,''))));
    const parsed = JSON.parse(decoded);
    state = { ...state, ...parsed };
    currentBlock = state.currentBlock || 1;
    saveState();
    buildBlockBar();
    buildWeekBar();
    renderExercises();
    loadComment();
    renderWeightLog();
    renderBlockInfo();
    setTimeout(() => {
      document.getElementById('ghUser').value = state.settings.ghUser || '';
      document.getElementById('ghRepo').value = state.settings.ghRepo || '';
      document.getElementById('ghToken').value = state.settings.ghToken || '';
    }, 0);
    showToast('Loaded from GitHub ✓', 'success');
    closeModal('ghModal');
  } catch(e) { showToast('Error loading data', 'error'); }
}

// ─── EXPORT / IMPORT ─────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify(safeStateForSync(), null, 2)], { type:'application/json' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = `gymothy-backup-${today()}.json`; a.click();
}

function importData(e) {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      state = { ...state, ...parsed };
      currentBlock = state.currentBlock || 1;
      saveState(); buildBlockBar(); buildWeekBar(); renderExercises(); loadComment(); renderWeightLog(); renderBlockInfo();
      showToast('Imported ✓', 'success');
    } catch(err) { showToast('Invalid file', 'error'); }
  };
  reader.readAsText(file);
}

function confirmClear() {
  document.getElementById('confirmTitle').textContent = 'Clear all data?';
  document.getElementById('confirmMsg').textContent = 'This permanently deletes all sessions, weights, and blocks. Cannot be undone.';
  document.getElementById('confirmOk').onclick = () => {
    state.sessions = {}; state.weights = {};
    state.blocks = { 1: { startDate: today(), label: 'Block 1' } };
    state.currentBlock = 1; currentBlock = 1; currentWeek = 1;
    saveState(); buildBlockBar(); buildWeekBar(); renderExercises(); loadComment(); renderWeightLog(); renderBlockInfo();
    closeModal('confirmModal');
    showToast('Data cleared', 'success');
  };
  document.body.classList.add('modal-open');
  document.getElementById('confirmModal').classList.add('open');
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function showPage(page, tabEl) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  if (tabEl) tabEl.classList.add('active');
  const titles = { train:'Gymothy', progress:'Progress', weight:'Body weight', settings:'Settings' };
  document.getElementById('navTitle').textContent = titles[page];
  if (page === 'progress') showProgressPage();
  if (page === 'weight') { renderWeightLog(); setTodayDate(); }
  if (page === 'settings') renderBlockInfo();
}

// Close modals on overlay tap
['exModal','ghModal','confirmModal'].forEach(id => {
  document.getElementById(id).addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(id); });
});

// ─── TOAST ────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
